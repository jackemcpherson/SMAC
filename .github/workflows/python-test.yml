name: Python Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v7

      - name: Set up Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev --all-extras

      - name: Run tests
        run: uv run pytest

      - name: Run linting
        run: uv run ruff check --exclude "src/smac/_version.py"

      - name: Run type checking
        run: uv run mypy src/smac
